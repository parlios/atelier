{% load static %}
<details class="mobile-navigation">
    <summary>
        <span class="brand-mark brand-mark--small" aria-hidden="true">A</span>
        <span>Navigation</span>
        <svg class="icon mobile-navigation-chevron" aria-hidden="true"><use href="{% static 'atelier/icons/ui.svg' %}#chevron-down"></use></svg>
    </summary>
    <div class="mobile-navigation-panel">
        {% include "includes/navigation.html" %}
        <form method="post" action="{% url 'core:logout' %}">
            {% csrf_token %}
            <button class="nav-item nav-item--button" type="submit">
                <svg class="icon" aria-hidden="true"><use href="{% static 'atelier/icons/ui.svg' %}#logout"></use></svg>
                <span>Déconnexion</span>
            </button>
        </form>
    </div>
</details>
